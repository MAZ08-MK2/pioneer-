<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pioneer DEQ-7200 with Lock</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #111;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
}

/* ===== OUTER UNIT ===== */
.unit {
  width: 100vw; height: 100vh;
  background: linear-gradient(180deg, #1a1a1a 0%, #0e0e0e 40%, #080808 100%);
  display: flex; flex-direction: column;
  position: relative; border-top: 2px solid #333; border-bottom: 2px solid #000;
  overflow: hidden;
}

/* brushed metal top edge */
.unit::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #222, #555, #888, #555, #333, #555, #888, #555, #222);
}

/* ===== PASSCODE OVERLAY ===== */
.overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.96);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 500; gap: 20px;
}
.ov-pioneer { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 900; color: #ccc; letter-spacing: 5px; }
.pass-display { 
  font-size: 42px; color: #00ff66; letter-spacing: 12px; height: 60px; 
  text-shadow: 0 0 12px #00ff66; font-family: 'Orbitron'; 
  background: #050a05; padding: 0 20px; border-radius: 4px; border: 1px solid #1a331a;
}
.keypad { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; }
.key-btn {
  width: 75px; height: 55px; 
  background: linear-gradient(180deg, #2a2a2a, #151515);
  border: 1px solid #444; color: #eee; font-size: 20px; font-family: 'Orbitron';
  cursor: pointer; border-radius: 4px; box-shadow: 0 3px 6px rgba(0,0,0,0.5);
}
.key-btn:active { background: #333; transform: translateY(1px); }
.ov-err { color: #ff2200; font-size: 12px; letter-spacing: 2px; height: 20px; opacity: 0; transition: 0.3s; }

/* ===== TOP LABEL BAR ===== */
.top-bar {
  display: flex; align-items: center; padding: 3px 10px 2px;
  background: linear-gradient(180deg, #1e1e1e 0%, #141414 100%);
  border-bottom: 1px solid #000; flex-shrink: 0; height: 28px;
}
.pioneer-logo { font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 900; color: #ccc; letter-spacing: 3px; margin-right: 6px; }
.pioneer-logo::before { content: '⊕ '; color: #aaa; font-size: 9px; }
.model-name { font-size: 8px; color: #666; letter-spacing: 1px; margin-right: auto; }
.dsp-badge { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 900; color: #bbb; letter-spacing: 2px; }

/* ===== SOUND FIELD LABELS ===== */
.soundfield-bar {
  display: flex; align-items: center; padding: 1px 8px; background: #0d0d0d;
  border-bottom: 1px solid #000; gap: 4px; flex-shrink: 0; height: 16px;
}
.sf-label { font-size: 7px; color: #555; letter-spacing: 1px; white-space: nowrap; padding: 0 4px; border-right: 1px solid #222; }
.sf-label.active { color: #00cc55; text-shadow: 0 0 4px #00ff66; }

/* ===== MAIN SECTION ===== */
.main { flex: 1; display: flex; flex-direction: row; padding: 4px 6px; gap: 6px; overflow: hidden; }
.left-ctrl { width: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
.knob {
  width: 34px; height: 34px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #444, #1a1a1a 60%, #0a0a0a);
  border: 2px solid #2a2a2a; box-shadow: 0 2px 6px rgba(0,0,0,0.9); position: relative;
}
.knob-sm { width: 22px; height: 22px; }

/* ===== CENTER: EQ DISPLAY ===== */
.eq-center { flex: 1; display: flex; flex-direction: column; background: #080808; border: 1px solid #1a1a1a; border-radius: 3px; overflow: hidden; position: relative; }
.screen-bezel { flex: 1; background: #020402; margin: 3px; border: 1px solid #111; border-radius: 2px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.eq-canvas-wrap { flex: 1; position: relative; }
canvas { width: 100%; height: 100%; display: block; }
.freq-row { display: flex; padding: 0 4px 2px; background: #020402; flex-shrink: 0; }
.freq-cell { font-size: 6.5px; color: #335533; text-align: center; flex: 1; }
.freq-cell.bright { color: #447744; }

/* ===== RIGHT PANEL ===== */
.right-panel { width: 120px; display: flex; flex-direction: column; gap: 4px; }
.seg-display { background: #000; border: 1px solid #111; padding: 4px 6px; display: flex; flex-direction: column; align-items: flex-end; }
.seg-number { font-size: 32px; color: #ff2200; text-shadow: 0 0 6px #ff4400; line-height: 1; letter-spacing: -2px; }

/* ===== BOTTOM BAR ===== */
.bottom-bar { display: flex; align-items: center; padding: 3px 8px; background: #111; gap: 4px; flex-shrink: 0; height: 26px; }
.bb-btn { border: 1px solid #2a2a2a; color: #555; font-size: 7px; padding: 2px 6px; cursor: pointer; }
.bb-btn.active { color: #00dd55; text-shadow: 0 0 4px #00ff66; }
</style>
</head>
<body>

<div class="unit">
  <div class="overlay" id="passOverlay">
    <div class="ov-pioneer">⊕ PIONEER</div>
    <div class="pass-display" id="passCodeDisplay">____</div>
    <div class="keypad">
      <button class="key-btn" onclick="pressKey('1')">1</button>
      <button class="key-btn" onclick="pressKey('2')">2</button>
      <button class="key-btn" onclick="pressKey('3')">3</button>
      <button class="key-btn" onclick="pressKey('4')">4</button>
      <button class="key-btn" onclick="pressKey('5')">5</button>
      <button class="key-btn" onclick="pressKey('6')">6</button>
      <button class="key-btn" onclick="pressKey('7')">7</button>
      <button class="key-btn" onclick="pressKey('8')">8</button>
      <button class="key-btn" onclick="pressKey('9')">9</button>
      <button class="key-btn" style="color:#f44" onclick="clearPass()">CLR</button>
      <button class="key-btn" onclick="pressKey('0')">0</button>
      <button class="key-btn" style="color:#0f6" onclick="checkPass()">ON</button>
    </div>
    <div class="ov-err" id="passError">INVALID PASSCODE</div>
  </div>

  <div class="top-bar">
    <span class="pioneer-logo">PIONEER</span>
    <span class="model-name">DSP AUDIO PROCESSOR DEQ-7200</span>
    <span class="dsp-badge">DSP</span>
  </div>

  <div class="soundfield-bar">
    <div class="sf-label active">STUDIO</div>
    <div class="sf-label">CLUB</div>
    <div class="sf-label">HOUSE</div>
    <div class="sf-label">ROCK</div>
    <div class="sf-label">POPS</div>
    <div class="sf-label">JAZZ</div>
    <div style="flex:1"></div>
    <div class="sf-label" style="color:#311; border:none">PEAK</div>
  </div>

  <div class="main">
    <div class="left-ctrl">
      <div class="knob knob-sm"></div>
      <div class="knob"></div>
    </div>
    <div class="eq-center">
      <div class="screen-bezel">
        <div class="eq-canvas-wrap"><canvas id="eqCanvas"></canvas></div>
        <div class="freq-row" id="freqRow"></div>
      </div>
    </div>
    <div class="right-panel">
      <div class="seg-display"><div class="seg-number" id="segNumber">15</div></div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;">
        <div class="knob knob-sm"></div>
        <div class="knob knob-sm"></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bb-btn active">SPECTRUM ANALYZER</div>
    <div class="bb-btn active">FACTORY PRESET</div>
    <div style="flex:1"></div>
    <div class="bb-btn">POSITION</div>
  </div>
</div>

<script>
// === PASSCODE LOGIC ===
let currentPass = "";
const TARGET_PASS = "0310";

function pressKey(n) {
  if(currentPass.length < 4) {
    currentPass += n;
    updateDisplay();
  }
}
function clearPass() {
  currentPass = "";
  updateDisplay();
  document.getElementById('passError').style.opacity = 0;
}
function updateDisplay() {
  document.getElementById('passCodeDisplay').textContent = currentPass.padEnd(4, "_");
}
function checkPass() {
  if(currentPass === TARGET_PASS) {
    document.getElementById('passOverlay').style.display='none';
    startAudio();
  } else {
    document.getElementById('passError').style.opacity = 1;
    setTimeout(clearPass, 600);
  }
}

// === AUDIO (元の高品質スペアナ) ===
let audioCtx, analyser, source;
let isRunning = false;
const FFT_SIZE = 2048;
const BAND_FREQS = [20, 50, 100, 200, 400, 630, 1000, 1600, 2500, 4000, 6300, 8000, 10000, 12500, 16000, 20000];
const SHOW_LABELS = [20, 50, 100, 200, 400, 1000, 2500, 6300, 10000, 16000];
const DOT_ROWS = 16;
let peaks = new Array(BAND_FREQS.length).fill(0);

const canvas = document.getElementById('eqCanvas');
const ctx = canvas.getContext('2d');

function buildFreqLabels() {
  const row = document.getElementById('freqRow');
  row.innerHTML = '';
  BAND_FREQS.forEach(f => {
    const d = document.createElement('div');
    d.className = 'freq-cell' + (SHOW_LABELS.includes(f) ? ' bright' : '');
    d.textContent = SHOW_LABELS.includes(f) ? (f >= 1000 ? (f/1000)+'k' : f) : '';
    row.appendChild(d);
  });
}

async function startAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.75;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    isRunning = true;
    draw();
  } catch(e) { alert("Mic Access Denied"); }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}

function draw() {
  requestAnimationFrame(draw);
  if (!isRunning) return;

  const freqData = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(freqData);
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#020402'; ctx.fillRect(0,0,W,H);

  const nBands = BAND_FREQS.length;
  const colW = W / nBands;
  const dotSize = colW * 0.75; // 元の太さ
  const rowH = H / DOT_ROWS;

  for (let i = 0; i < nBands; i++) {
    const f = BAND_FREQS[i];
    const idx = Math.floor(f / (audioCtx.sampleRate/2) * freqData.length);
    let v = freqData[idx] / 255;
    if (i > 10) v *= 1.2; // 高域感度補正
    v = Math.min(1, v);

    if (v > peaks[i]) peaks[i] = v; else peaks[i] -= 0.008;
    const litRows = Math.round(v * DOT_ROWS);

    for (let r = 0; r < DOT_ROWS; r++) {
      const fromBottom = DOT_ROWS - 1 - r;
      const cx = i * colW + (colW - dotSize)/2;
      const cy = r * rowH + (rowH * 0.1);

      if (fromBottom < litRows) {
        ctx.shadowBlur = 8;
        if (fromBottom >= DOT_ROWS-2) { ctx.fillStyle = '#ff2200'; ctx.shadowColor = '#ff2200'; }
        else if (fromBottom >= DOT_ROWS-4) { ctx.fillStyle = '#ccaa00'; ctx.shadowColor = '#ccaa00'; }
        else { ctx.fillStyle = '#00cc44'; ctx.shadowColor = '#00cc44'; }
        roundRect(ctx, cx, cy, dotSize, rowH * 0.8, 1);
        ctx.fill();
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = fromBottom >= DOT_ROWS-2 ? '#1a0505' : '#051205';
        roundRect(ctx, cx, cy, dotSize, rowH * 0.8, 1);
        ctx.fill();
      }
    }
  }
}

window.addEventListener('resize', () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; });
canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight;
buildFreqLabels();
</script>
</body>
</html>

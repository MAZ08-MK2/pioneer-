<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pioneer DEQ-7200 Custom</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #111;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
}

/* ===== OUTER UNIT ===== */
.unit {
  width: 100vw;
  height: 100vh;
  background: linear-gradient(180deg, #1a1a1a 0%, #0e0e0e 40%, #080808 100%);
  display: flex;
  flex-direction: column;
  position: relative;
  border-top: 2px solid #333;
  border-bottom: 2px solid #000;
  overflow: hidden;
}

.top-bar {
  display: flex;
  align-items: center;
  padding: 3px 10px 2px;
  background: linear-gradient(180deg, #1e1e1e 0%, #141414 100%);
  border-bottom: 1px solid #000;
  flex-shrink: 0;
  height: 28px;
}

.pioneer-logo {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 900;
  color: #ccc;
  letter-spacing: 3px;
  margin-right: 6px;
}

.model-name {
  font-size: 8px;
  color: #666;
  letter-spacing: 1px;
  margin-right: auto;
}

.dsp-badge {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 900;
  color: #bbb;
  letter-spacing: 2px;
}

.soundfield-bar {
  display: flex;
  align-items: center;
  padding: 1px 8px;
  background: #0d0d0d;
  border-bottom: 1px solid #000;
  gap: 4px;
  flex-shrink: 0;
  height: 16px;
}

.sf-label {
  font-size: 7px;
  color: #555;
  white-space: nowrap;
}

.sf-label.active {
  color: #00cc55;
  text-shadow: 0 0 4px #00ff66;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: row;
  padding: 4px 6px;
  gap: 6px;
}

.left-ctrl { width: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
.knob {
  width: 34px; height: 34px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #444, #1a1a1a 60%, #0a0a0a);
  border: 2px solid #2a2a2a; position: relative;
}
.knob-sm { width: 22px; height: 22px; }

.eq-center {
  flex: 1;
  background: #080808;
  border: 1px solid #1a1a1a;
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  margin: 3px;
}

.screen-bezel {
  flex: 1;
  background: #020402;
  margin: 2px;
  position: relative;
  display: flex;
  flex-direction: column;
}

.eq-canvas-wrap { flex: 1; position: relative; }
canvas { width: 100%; height: 100%; display: block; }

.freq-row { display: flex; padding: 0 4px 2px; background: #020402; }
.freq-cell { font-size: 6.5px; color: #335533; text-align: center; flex: 1; }

.right-panel { width: 120px; display: flex; flex-direction: column; gap: 4px; }
.seg-display { background: #000; padding: 4px 6px; display: flex; flex-direction: column; align-items: flex-end; }
.seg-number { font-size: 32px; color: #ff2200; text-shadow: 0 0 6px #ff4400; line-height: 1; }

.bottom-bar { display: flex; align-items: center; padding: 3px 8px; background: #111; height: 26px; gap: 4px; }
.bb-btn { border: 1px solid #2a2a2a; font-size: 7px; color: #555; padding: 2px 6px; }

/* === PASSCODE OVERLAY === */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  gap: 20px;
}

.pass-display {
  font-size: 40px;
  color: #00ff66;
  letter-spacing: 15px;
  height: 50px;
  text-shadow: 0 0 10px #00ff66;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 15px;
}

.key-btn {
  width: 70px; height: 50px;
  background: #222; border: 1px solid #444;
  color: #fff; font-size: 20px; font-family: 'Orbitron';
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.key-btn:active { background: #444; }

.ov-err { color: #ff2200; font-size: 14px; margin-top: 10px; opacity: 0; transition: 0.3s; }

</style>
</head>
<body>

<div class="unit">

  <div class="overlay" id="passOverlay">
    <div class="pioneer-logo" style="font-size: 20px;">⊕ PIONEER</div>
    <div class="pass-display" id="passCodeDisplay">____</div>
    <div class="keypad">
      <button class="key-btn" onclick="pressKey('1')">1</button>
      <button class="key-btn" onclick="pressKey('2')">2</button>
      <button class="key-btn" onclick="pressKey('3')">3</button>
      <button class="key-btn" onclick="pressKey('4')">4</button>
      <button class="key-btn" onclick="pressKey('5')">5</button>
      <button class="key-btn" onclick="pressKey('6')">6</button>
      <button class="key-btn" onclick="pressKey('7')">7</button>
      <button class="key-btn" onclick="pressKey('8')">8</button>
      <button class="key-btn" onclick="pressKey('9')">9</button>
      <button class="key-btn" style="background:#400" onclick="clearPass()">C</button>
      <button class="key-btn" onclick="pressKey('0')">0</button>
      <button class="key-btn" style="background:#040" onclick="checkPass()">ON</button>
    </div>
    <div class="ov-err" id="passError">INVALID PASSCODE</div>
  </div>

  <div class="top-bar">
    <span class="pioneer-logo">PIONEER</span>
    <span class="model-name">DSP AUDIO PROCESSOR DEQ-7200</span>
    <span class="dsp-badge">DSP</span>
  </div>

  <div class="soundfield-bar">
    <div class="sf-label active">STUDIO</div>
    <div class="sf-label">CLUB</div>
    <div class="sf-label">ROCK</div>
    <div class="sf-label">POPS</div>
    <div style="flex:1"></div>
    <div class="sf-label" id="peakLabel" style="color:#420">PEAK</div>
  </div>

  <div class="main">
    <div class="left-ctrl">
      <div class="knob knob-sm"></div>
      <div class="knob"></div>
    </div>

    <div class="eq-center">
      <div class="screen-bezel">
        <div class="eq-canvas-wrap">
          <canvas id="eqCanvas"></canvas>
        </div>
        <div class="freq-row" id="freqRow"></div>
      </div>
    </div>

    <div class="right-panel">
      <div class="seg-display">
        <div class="seg-number" id="segNumber">15</div>
      </div>
      <div class="right-knobs" style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:20px;">
        <div class="knob knob-sm"></div>
        <div class="knob knob-sm"></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bb-btn">SPECTRUM ANALYZER</div>
    <div class="bb-btn">FACTORY PRESET</div>
  </div>

</div>

<script>
let audioCtx, analyser, source;
let isRunning = false;
let currentPass = "";
const TARGET_PASS = "0310";

// --- PASSCODE LOGIC ---
function pressKey(num) {
  if (currentPass.length < 4) {
    currentPass += num;
    updatePassDisplay();
  }
}

function clearPass() {
  currentPass = "";
  updatePassDisplay();
  document.getElementById('passError').style.opacity = 0;
}

function updatePassDisplay() {
  let display = currentPass.padEnd(4, "_");
  document.getElementById('passCodeDisplay').textContent = display;
}

async function checkPass() {
  if (currentPass === TARGET_PASS) {
    document.getElementById('passOverlay').style.display = 'none';
    startAudio();
  } else {
    document.getElementById('passError').style.opacity = 1;
    setTimeout(clearPass, 500);
  }
}

// --- AUDIO LOGIC ---
const FFT_SIZE = 1024;
// バンド数を少し減らして1本あたりの太さを確保 (2倍の太さへ)
const BAND_FREQS = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
const DOT_ROWS = 16;
let peaks = new Array(BAND_FREQS.length).fill(0);

const canvas = document.getElementById('eqCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
}

async function startAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.7;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    isRunning = true;
    draw();
  } catch(e) {
    alert("MIC ERROR: " + e);
  }
}

function draw() {
  requestAnimationFrame(draw);
  if (!isRunning) return;

  const freqData = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(freqData);
  
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const nBands = BAND_FREQS.length;
  const colW = W / nBands;
  const dotSize = colW * 0.85; // スペアナの太さを調整（以前より太く）
  const rowH = H / DOT_ROWS;

  for (let i = 0; i < nBands; i++) {
    const f = BAND_FREQS[i];
    const idx = Math.floor(f / (audioCtx.sampleRate / 2) * freqData.length);
    let v = freqData[idx] / 255;

    // --- 感度調整 ---
    if (f >= 500 && f < 4000) {
      v *= 1.6; // 中音域の感度アップ
    } else if (f >= 4000) {
      v *= 2.2; // 高音域の感度アップ
    } else {
      v *= 1.1; // 低音も少し補正
    }
    v = Math.min(1, v);

    if (v > peaks[i]) peaks[i] = v;
    else peaks[i] -= 0.01;

    const litRows = Math.round(v * DOT_ROWS);

    for (let r = 0; r < DOT_ROWS; r++) {
      const fromBottom = DOT_ROWS - 1 - r;
      const cy = r * rowH + 2;
      const cx = i * colW + (colW - dotSize) / 2;

      if (fromBottom < litRows) {
        // 色設定
        if (fromBottom > 13) ctx.fillStyle = '#ff2200';
        else if (fromBottom > 10) ctx.fillStyle = '#ffcc00';
        else ctx.fillStyle = '#00ff66';
        
        ctx.fillRect(cx, cy, dotSize, rowH - 2);
      } else {
        ctx.fillStyle = '#051005';
        ctx.fillRect(cx, cy, dotSize, rowH - 2);
      }
    }
  }
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pioneer DEQ-7200 - Security</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #111;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
}

/* ===== OUTER UNIT ===== */
.unit {
  width: 100vw;
  height: 100vh;
  background: linear-gradient(180deg, #1a1a1a 0%, #0e0e0e 40%, #080808 100%);
  display: flex;
  flex-direction: column;
  position: relative;
  border-top: 2px solid #333;
  border-bottom: 2px solid #000;
  overflow: hidden;
}

/* brushed metal top edge */
.unit::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #222, #555, #888, #555, #333, #555, #888, #555, #222);
}

/* ===== PASSCODE OVERLAY ===== */
#passcodeOverlay {
  position: absolute;
  inset: 0;
  background: #050505;
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.pass-display {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  color: #ff2200;
  background: #000;
  border: 2px solid #222;
  padding: 10px 30px;
  letter-spacing: 10px;
  min-width: 180px;
  text-align: center;
  box-shadow: inset 0 0 10px rgba(255,0,0,0.5), 0 0 15px rgba(255,30,0,0.2);
  border-radius: 4px;
}

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.num-btn {
  width: 60px;
  height: 50px;
  background: linear-gradient(180deg, #222, #111);
  border: 1px solid #333;
  color: #aaa;
  font-size: 18px;
  font-family: 'Orbitron', sans-serif;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.1s;
}

.num-btn:active {
  background: #333;
  color: #fff;
  transform: translateY(2px);
}

.pass-label {
  color: #555;
  font-size: 10px;
  letter-spacing: 2px;
}

/* ===== ORIGINAL OVERLAY ===== */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: none; /* Initially hidden until pass correct */
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  gap: 12px;
}

.ov-logo {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 900;
  color: #ccc;
  letter-spacing: 6px;
  text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

.ov-model {
  font-size: 10px;
  color: #555;
  letter-spacing: 3px;
}

.ov-btn {
  background: transparent;
  border: 1px solid #00cc44;
  color: #00dd55;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  padding: 8px 24px;
  cursor: pointer;
  text-shadow: 0 0 6px #00ff66;
  box-shadow: 0 0 12px rgba(0,200,60,0.2);
  margin-top: 4px;
}

.ov-err {
  font-size: 9px;
  color: #cc2200;
  letter-spacing: 2px;
  display: none;
}

/* TOP LABEL BAR */
.top-bar {
  display: flex;
  align-items: center;
  padding: 3px 10px 2px;
  background: linear-gradient(180deg, #1e1e1e 0%, #141414 100%);
  border-bottom: 1px solid #000;
  flex-shrink: 0;
  height: 28px;
}

.pioneer-logo {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 900;
  color: #ccc;
  letter-spacing: 3px;
  margin-right: 6px;
}

.model-name {
  font-size: 8px;
  color: #666;
  letter-spacing: 1px;
  margin-right: auto;
}

.dsp-badge {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 900;
  color: #bbb;
  letter-spacing: 2px;
  margin-left: 8px;
}

/* SOUND FIELD LABELS */
.soundfield-bar {
  display: flex;
  align-items: center;
  padding: 1px 8px;
  background: #0d0d0d;
  border-bottom: 1px solid #000;
  height: 16px;
}

.sf-label {
  font-size: 7px;
  color: #555;
  letter-spacing: 1px;
  padding: 0 4px;
  border-right: 1px solid #222;
}

.sf-label.active {
  color: #00cc55;
  text-shadow: 0 0 4px #00ff66;
}

/* MAIN SECTION */
.main {
  flex: 1;
  display: flex;
  padding: 4px 6px;
  gap: 6px;
  overflow: hidden;
}

.left-ctrl {
  width: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.vol-label { font-size: 7px; color: #555; }

.knob {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #444, #1a1a1a 60%, #0a0a0a);
  border: 2px solid #2a2a2a;
  position: relative;
}

.knob::after {
  content: '';
  position: absolute;
  width: 2px; height: 11px;
  background: #888;
  top: 3px; left: 50%;
  transform: translateX(-50%);
}

.eq-center {
  flex: 1;
  background: #080808;
  border: 1px solid #1a1a1a;
  border-radius: 3px;
  display: flex;
  flex-direction: column;
}

.screen-bezel {
  flex: 1;
  background: #020402;
  margin: 3px;
  border: 1px solid #111;
  position: relative;
  display: flex;
  flex-direction: column;
}

.eq-canvas-wrap { flex: 1; position: relative; }
canvas { width: 100%; height: 100%; display: block; }

.freq-row { display: flex; padding: 0 4px 2px; background: #020402; }
.freq-cell { font-size: 6.5px; color: #335533; text-align: center; flex: 1; }

.right-panel { width: 120px; display: flex; flex-direction: column; gap: 4px; }
.seg-display {
  background: #000;
  padding: 4px 6px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.seg-number {
  font-size: 32px;
  color: #ff2200;
  text-shadow: 0 0 6px #ff4400;
  line-height: 1;
}

.vol-display {
  background: #000;
  padding: 3px 5px;
  display: flex;
}
.mini-bar { display: flex; gap: 1px; }
.mini-seg { width: 4px; height: 6px; background: #0a1a0a; }
.mini-seg.lit { background: #00cc44; }

.bottom-bar {
  display: flex;
  align-items: center;
  padding: 3px 8px;
  background: #111;
  border-top: 1px solid #000;
  height: 26px;
  gap: 4px;
}
.bb-btn {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: #555;
  font-size: 7px;
  padding: 2px 6px;
}
</style>
</head>
<body>

<div class="unit">

  <div id="passcodeOverlay">
    <div class="ov-logo" style="font-size: 14px; margin-bottom: -10px;">SECURITY CHECK</div>
    <div class="pass-label">ENTER PASSCODE</div>
    <div class="pass-display" id="passDisplay">----</div>
    <div class="numpad">
      <button class="num-btn" onclick="pressKey('1')">1</button>
      <button class="num-btn" onclick="pressKey('2')">2</button>
      <button class="num-btn" onclick="pressKey('3')">3</button>
      <button class="num-btn" onclick="pressKey('4')">4</button>
      <button class="num-btn" onclick="pressKey('5')">5</button>
      <button class="num-btn" onclick="pressKey('6')">6</button>
      <button class="num-btn" onclick="pressKey('7')">7</button>
      <button class="num-btn" onclick="pressKey('8')">8</button>
      <button class="num-btn" onclick="pressKey('9')">9</button>
      <button class="num-btn" style="color:#666" onclick="clearPass()">C</button>
      <button class="num-btn" onclick="pressKey('0')">0</button>
      <button class="num-btn" style="color:#666" onclick="backspace()">←</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="ov-logo">⊕ PIONEER</div>
    <div class="ov-model">DSP AUDIO PROCESSOR DEQ-7200</div>
    <button class="ov-btn" onclick="startAudio()">▶ POWER ON</button>
    <div class="ov-err" id="errMsg">ERROR: MIC ACCESS DENIED</div>
  </div>

  <div class="top-bar">
    <span class="pioneer-logo">PIONEER</span>
    <span class="model-name">DSP AUDIO PROCESSOR DEQ-7200</span>
    <span class="dsp-badge">DSP</span>
  </div>

  <div class="soundfield-bar">
    <div class="sf-label active" id="sf-studio">STUDIO</div>
    <div class="sf-label" id="sf-club">CLUB</div>
    <div class="sf-label" id="sf-line">LINE</div>
    <div class="sf-label" id="sf-u1">USER1</div>
    <div class="sf-spacer" style="flex:1"></div>
    <div class="sf-label" style="color:#442200; border:none" id="peakLabel">PEAK</div>
  </div>

  <div class="main">
    <div class="left-ctrl">
      <div class="vol-label">VOLUME</div>
      <div class="knob"></div>
    </div>
    <div class="eq-center">
      <div class="screen-bezel">
        <div class="eq-canvas-wrap">
          <canvas id="eqCanvas"></canvas>
        </div>
        <div class="freq-row" id="freqRow"></div>
      </div>
    </div>
    <div class="right-panel">
      <div class="seg-display">
        <div class="seg-number" id="segNumber">00</div>
      </div>
      <div class="vol-display">
        <div class="mini-bar" id="barL"></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bb-btn active">SPECTRUM ANALYZER</div>
    <div class="bb-btn">FACTORY PRESET</div>
  </div>

</div>

<script>
// === PASSCODE LOGIC ===
const TARGET_PASS = "0310";
let currentInput = "";

function pressKey(num) {
  if (currentInput.length < 4) {
    currentInput += num;
    updateDisplay();
    if (currentInput.length === 4) {
      checkPass();
    }
  }
}

function clearPass() {
  currentInput = "";
  updateDisplay();
}

function backspace() {
  currentInput = currentInput.slice(0, -1);
  updateDisplay();
}

function updateDisplay() {
  const display = document.getElementById('passDisplay');
  display.textContent = currentInput.padEnd(4, '-');
}

function checkPass() {
  if (currentInput === TARGET_PASS) {
    document.getElementById('passcodeOverlay').style.display = 'none';
    document.getElementById('overlay').style.display = 'flex';
  } else {
    const display = document.getElementById('passDisplay');
    display.style.color = "#ffffff";
    display.textContent = "ERR";
    setTimeout(() => {
      display.style.color = "#ff2200";
      clearPass();
    }, 800);
  }
}

// === AUDIO & CANVAS (MINIFIED FOR RELEVANCE) ===
let audioCtx, analyser, isRunning = false;
const canvas = document.getElementById('eqCanvas');
const ctx = canvas.getContext('2d');
const BAND_FREQS = [20, 50, 100, 200, 400, 1000, 2500, 6300, 10000, 16000];

function resize() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
}

async function startAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    isRunning = true;
    document.getElementById('overlay').style.display = 'none';
    draw();
  } catch(e) {
    document.getElementById('errMsg').style.display = 'block';
  }
}

function draw() {
  requestAnimationFrame(draw);
  if (!isRunning) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const barW = canvas.width / BAND_FREQS.length;
  for(let i=0; i<BAND_FREQS.length; i++) {
    const h = (data[i*5] / 255) * canvas.height;
    ctx.fillStyle = "#00cc44";
    ctx.fillRect(i*barW + 2, canvas.height - h, barW - 4, h);
  }
  
  document.getElementById('segNumber').textContent = Math.floor(Math.random() * 10 + 15);
}

window.addEventListener('resize', resize);
resize();

// Init labels
const row = document.getElementById('freqRow');
BAND_FREQS.forEach(f => {
  const d = document.createElement('div');
  d.className = 'freq-cell';
  d.textContent = f >= 1000 ? (f/1000)+'k' : f;
  row.appendChild(d);
});

// Mini bar init
const barL = document.getElementById('barL');
for(let i=0; i<15; i++) {
  const s = document.createElement('div');
  s.className = 'mini-seg';
  barL.appendChild(s);
}
</script>
</body>
</html>
